{% extends "base.html" %}

<div class="site-container success-page">

        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5 13 10 18 19 7"></polyline>

    </div>

    <div class="success-page__actions">
        <a href="/" class="btn btn--primary btn--lg">Back to home</a>
        <a href="/blog.html" class="btn btn--outline btn--lg">Browse the guides</a>
    </div>
</div>
